.kpi-card.blue{border-color:#A5B4FC;background:var(--blue-lt)}

.report-table{width:100%;border-collapse:collapse;font-size:13px}

.report-table td{padding:8px 9px;border-bottom:1px solid var(--border);color:var(--ink2)}
.report-table tr:last-child td{border-bottom:none}
.report-table tr:hover td{background:var(--bg)}
/* Setup screen */
.setup-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.setup-card{background:var(--surface);border-radius:16px;padding:36px;width:100%;max-width:460px;box-shadow:var(--shadow-md)}
.setup-logo{font-size:48px;text-align:center;margin-bottom:8px}
.setup-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.setup-sub{font-size:14px;color:var(--ink3);text-align:center;margin-bottom:28px}
.setup-steps{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
.setup-step{display:flex;gap:12px;align-items:flex-start}

.step-text{font-size:13.5px;color:var(--ink2);line-height:1.5}

@keyframes spin{to{transform:rotate(360deg)}}
/* Синхронизация */
.sync-bar{position:fixed;bottom:16px;right:16px;background:var(--ink);color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;z-index:2000;display:flex;align-items:center;gap:8px}

.sync-bar.err{background:var(--red)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

// ── Supabase клиент (встроенный, без npm) ────────────────────────────────────
const CONFIG_KEY = 'kt_sb_config';
const getConfig = () => { try { return JSON.parse(localStorage.getItem(CONFIG_KEY)); } catch { return null; } };
const saveConfig = (url, key) => localStorage.setItem(CONFIG_KEY, JSON.stringify({url, key}));
const clearConfig = () => { localStorage.removeItem(CONFIG_KEY); window.location.reload(); };

function makeClient(url, anonKey) {
  const h = { 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

  const req = async (method, path, body, extraHeaders={}) => {
    const res = await fetch(`${url}/rest/v1/${path}`, { method, headers: {...h, ...extraHeaders}, body: body ? JSON.stringify(body) : undefined });
    if (!res.ok) { const e = await res.json().catch(()=>({message:'Network error'})); throw new Error(e.message || `HTTP ${res.status}`); }
    return res.status === 204 ? [] : res.json();
  };

  return {
    select: (table, cols='*', filters='', order='created_at') =>
      req('GET', `${table}?select=${cols}${filters}&order=${order}`),
    insert: (table, data) => req('POST', table, data),
    update: (table, data, id) => req('PATCH', `${table}?id=eq.${id}`, data),
    upsert: (table, data, constraint) => req('POST', table, data, {'Prefer': `resolution=merge-duplicates,return=representation`}),
    delete: (table, col, val) => req('DELETE', `${table}?${col}=eq.${encodeURIComponent(val)}`),
  };
}

let _sb = null;
const getSB = () => { if (!_sb) { const c=getConfig(); if (!c) throw new Error('No config'); _sb=makeClient(c.url, c.key); } return _sb; };

// ── Тарифы и расчёты ─────────────────────────────────────────────────────────
const MONTHLY_RATES = {'2x':300000,'3x':450000};
const SESSION_RATES = {'2x':37500,'3x':37500};
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const WDAYS  = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const fmt  = n => new Intl.NumberFormat('ko-KR').format(n)+' ₩';
const sRate = f => MONTHLY_RATES[f] / (f==='2x'?8:12);
const hRate = f => sRate(f)/3;
const genId = () => crypto.randomUUID();
const pad   = n => String(n).padStart(2,'0');
const dKey  = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const mLabel = (y,m) => `${MONTHS[m-1]} ${y}`;

function calcDebt(student, sessions, payments, studentPayments=[]) {
  const sorted = [...sessions].filter(s=>s.student_id===student.id).sort((a,b)=>a.date.localeCompare(b.date));
  const freeCount = student.has_free ? (student.free_count||0) : 0;
  let debtAmount=0; const debtMonths=new Set();
  if (student.payment_type==='monthly') {
    const heldByMonth={};let heldIdx=0;
    for (const s of sorted) {
      if (!s.held) continue; heldIdx++;
      if (heldIdx<=freeCount) continue;
      const d=new Date(s.date), key=`${d.getFullYear()}-${d.getMonth()+1}`;
      heldByMonth[key]={year:d.getFullYear(),month:d.getMonth()+1};
    }
    for (const key of Object.keys(heldByMonth)) {
      const {year,month}=heldByMonth[key];
      const p=payments.find(p=>p.student_id===student.id&&p.year===year&&p.month===month);
      if (!p||!p.paid){debtAmount+=MONTHLY_RATES[student.frequency];debtMonths.add(key);}
    }
  } else {
    const rate=sRate(student.frequency); let heldIdx=0;
    for (const s of sorted) {
      if (!s.held) continue; heldIdx++;
      if (heldIdx<=freeCount||s.paid) continue;
      debtAmount+=rate; const d=new Date(s.date); debtMonths.add(`${d.getFullYear()}-${d.getMonth()+1}`);
    }
  }
  const paid=(studentPayments||[]).filter(p=>p.student_id===student.id).reduce((s,p)=>s+(+p.amount),0);
  debtAmount=Math.max(0,debtAmount-paid);
  return {debtAmount,debtMonths:Array.from(debtMonths),totalPaid:paid};
}

// ── Контекст данных ───────────────────────────────────────────────────────────
const DataCtx = createContext(null);

function DataProvider({children}) {
  const [students, setStudents] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [payments, setPayments] = useState([]);
  const [studentPayments, setStudentPayments] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [sync,     setSync]     = useState(null); // null|'saving'|'ok'|'err'
  const syncTimer = useRef(null);

  const showSync = (status) => {
    setSync(status);
    clearTimeout(syncTimer.current);
    if (status==='ok') syncTimer.current = setTimeout(()=>setSync(null), 2000);
  };

  const loadAll = useCallback(async () => {
    setLoading(true);
    try {
      const sb = getSB();
      const [s, ses, p, sp] = await Promise.all([
        sb.select('students'),
        sb.select('sessions'),
        sb.select('monthly_payments'),
        sb.select('payments','*','','created_at').catch(()=>[]),
      ]);
      setStudents(s||[]); setSessions(ses||[]); setPayments(p||[]); setStudentPayments(sp||[]);
    } catch(e) { console.error(e); }
    setLoading(false);
  }, []);

  useEffect(()=>{ loadAll(); }, [loadAll]);

  const withSync = async (fn) => {
    showSync('saving');
    try { await fn(); showSync('ok'); }
    catch(e) { showSync('err'); console.error(e); }
  };

  // Платежи
  const addPayment = (studentId, amount, note) => withSync(async () => {
    const sb=getSB(), row={id:genId(),student_id:studentId,amount:+amount,note:note||''};
    await sb.insert('payments',row);
    setStudentPayments(p=>[...p,row]);
  });
  const deletePayment = (id) => withSync(async () => {
    const sb=getSB(); await sb.delete('payments','id',id);
    setStudentPayments(p=>p.filter(x=>x.id!==id));
  });
  const updateNotes = (studentId, notes) => withSync(async () => {
    const sb=getSB(); await sb.update('students',{notes},studentId);
    setStudents(p=>p.map(s=>s.id===studentId?{...s,notes}:s));
  });

  // Ученики
  const addStudent = (data) => withSync(async () => {
    const sb=getSB(), row={...data,id:genId()};
    await sb.insert('students',row);
    setStudents(p=>[...p,row]);
  });
  const updateStudent = (id,data) => withSync(async () => {
    const sb=getSB(); await sb.update('students',data,id);
    setStudents(p=>p.map(s=>s.id===id?{...s,...data}:s));
  });
  const deleteStudent = (id) => withSync(async () => {
    const sb=getSB();
    await sb.delete('sessions','student_id',id);
    await sb.delete('monthly_payments','student_id',id);
    await sb.delete('students','id',id);
    setStudents(p=>p.filter(s=>s.id!==id));
    setSessions(p=>p.filter(s=>s.student_id!==id));
    setPayments(p=>p.filter(p=>p.student_id!==id));
  });

  // Занятия
  const addSession = (studentId, date, time='') => withSync(async () => {
    if (sessions.find(s=>s.student_id===studentId&&s.date===date)) return;
    const sb=getSB(), row={id:genId(),student_id:studentId,date,time,held:false,paid:false};
    await sb.insert('sessions',row);
    setSessions(p=>[...p,row]);
  });
  const updateSessionTime = (id, time) => withSync(async () => {
    const sb=getSB(); await sb.update('sessions',{time},id);
    setSessions(p=>p.map(s=>s.id===id?{...s,time}:s));
  });
  const removeSession = (id) => withSync(async () => {
    const sb=getSB(); await sb.delete('sessions','id',id);
    setSessions(p=>p.filter(s=>s.id!==id));
  });
  const toggleSession = (id, field) => withSync(async () => {
    const sb=getSB(), cur=sessions.find(s=>s.id===id);
    if (!cur) return;
    const val=!cur[field]; await sb.update('sessions',{[field]:val},id);
    setSessions(p=>p.map(s=>s.id===id?{...s,[field]:val}:s));
  });

  // Оплата
  const setMonthPayment = (studentId, year, month, paid) => withSync(async () => {
    const sb=getSB();
    const existing=payments.find(p=>p.student_id===studentId&&p.year===year&&p.month===month);
    if (existing) {
      await sb.update('monthly_payments',{paid},existing.id);
      setPayments(p=>p.map(x=>x.id===existing.id?{...x,paid}:x));
    } else {
      const row={id:genId(),student_id:studentId,year,month,paid};
      await sb.insert('monthly_payments',row);
      setPayments(p=>[...p,row]);
    }
  });

  return (
    <DataCtx.Provider value={{students,sessions,payments,loading,addStudent,updateStudent,deleteStudent,addSession,removeSession,toggleSession,setMonthPayment,updateSessionTime,reload:loadAll}}>
      {children}
      {sync && (
        <div className={`sync-bar ${sync==='saving'?'':sync}`}>
          {sync==='saving'&&<><div className="spinner" style={{width:14,height:14,borderWidth:2,marginRight:6}}/>Сохранение…</>}
          {sync==='ok'&&'✓ Сохранено'}
          {sync==='err'&&'✗ Ошибка сохранения'}
        </div>
      )}
    </DataCtx.Provider>
  );
}
const useData = () => useContext(DataCtx);

// ── Страница календарь ────────────────────────────────────────────────────────
function CalendarPage() {
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth()+1);
  const [selId,setSelId]=useState('');
  const {students,sessions,payments,addSession,removeSession,toggleSession,setMonthPayment,updateSessionTime}=useData();
  const [timePopup,setTimePopup]=useState(null); // {sessionId, date, currentTime}

  const prev=()=>{if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1);};
  const student=students.find(s=>s.id===selId)||null;
  const freeCount=student?.has_free?(student.free_count||0):0;
  const myS=sessions.filter(s=>s.student_id===selId&&new Date(s.date).getFullYear()===year&&new Date(s.date).getMonth()+1===month).sort((a,b)=>a.date.localeCompare(b.date));
  const allHeld=sessions.filter(s=>s.student_id===selId&&s.held).sort((a,b)=>a.date.localeCompare(b.date));
  const getHeldIdx=id=>allHeld.findIndex(s=>s.id===id)+1;
  const days=[],last=new Date(year,month,0).getDate();
  for(let d=1;d<=last;d++){const dow=(new Date(year,month-1,d).getDay()+6)%7;days.push({day:d,dow});}
  const firstDow=days[0].dow;
  const blanks=Array(firstDow).fill(null);
  const byDate={};myS.forEach(s=>{byDate[s.date]=s;});
  const monthPay=payments.find(p=>p.student_id===selId&&p.year===year&&p.month===month);
  const heldCount=myS.filter(s=>s.held).length;
  return (
    <div className="page">
      <div className="page-header"><div className="page-title"><span className="ti">📅</span><h1>Календарь оплат</h1></div></div>
      <div className="cal-controls">
        <select className="ss" value={selId} onChange={e=>setSelId(e.target.value)}>
          <option value="">— Выберите ученика —</option>
          {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <div className="month-nav">
          <button className="btn-icon" onClick={prev}>◀</button>
          <span className="month-label">{MONTHS[month-1]} {year}</span>
          <button className="btn-icon" onClick={next}>▶</button>
        </div>
      </div>
      {!student?<div className="empty-state"><div className="empty-icon">📅</div><p>Выберите ученика</p></div>:(
        <>
          <div className="cal-hint">Нажмите на день чтобы добавить или удалить занятие</div>
          <div className="calendar-wrap">
            <div className="cal-grid">
              {WDAYS.map(d=><div key={d} className="cal-head">{d}</div>)}
              {blanks.map((_,i)=><div key={`b${i}`}/>)}
              {days.map(({day,dow})=>{
                const k=`${year}-${pad(month)}-${pad(day)}`;
                const s=byDate[k]; const isToday=k===dKey(new Date());
                const hIdx=s?.held?getHeldIdx(s.id):0;
                const isFree=hIdx>0&&hIdx<=freeCount;
                return (
                  <div key={k} className={`cal-day ${s?'has-session':''} ${isToday?'today':''} ${s?.held&&!isFree?'held':''}`}
                    onClick={()=>{
      if(!student) return;
      if(s) removeSession(s.id);
      else setTimePopup({date:k, studentId:student.id, isNew:true, time:''});
    }}>
                    <span className="day-num">{day}</span>
                    {s&&<div className="session-controls" onClick={e=>e.stopPropagation()}>
                      {isFree?<span style={{fontSize:9,color:'var(--purple)',fontWeight:700}}>бесплатно</span>:<>
                        {s.time&&<span className="session-time-badge" onClick={()=>setTimePopup({sessionId:s.id,date:k,isNew:false,time:s.time||''})}>⏰ {s.time}</span>}
                        {!s.time&&<span style={{fontSize:9,color:'var(--ink3)',cursor:'pointer'}} onClick={()=>setTimePopup({sessionId:s.id,date:k,isNew:false,time:''})}>+ время</span>}
                        <label className="check-wrap"><input type="checkbox" checked={s.held} onChange={()=>toggleSession(s.id,'held')}/>✓</label>
                        {student.payment_type==='perSession'&&<label className="check-wrap paid-check"><input type="checkbox" checked={s.paid} onChange={()=>toggleSession(s.id,'paid')}/>₩</label>}
                      </>}
                    </div>}
                  </div>
                );
              })}
            </div>
          </div>
          <div className="month-summary">
            <div className="summary-row"><span>Занятий:</span><strong>{myS.length}</strong></div>
            <div className="summary-row"><span>Проведено:</span><strong>{heldCount}</strong></div>
            {student.payment_type==='monthly'?(
              <div className="summary-row"><span>Оплата за месяц:</span>
                <label className="month-pay-toggle">
                  <input type="checkbox" checked={monthPay?.paid||false} onChange={()=>setMonthPayment(student.id,year,month,!(monthPay?.paid||false))}/>
                  <span className={monthPay?.paid?'pay-paid':'pay-unpaid'}>{monthPay?.paid?'✓ Оплачен':'✗ Не оплачен'}</span>
                </label>
              </div>
            ):(
              <div className="summary-row"><span>Оплачено занятий:</span><strong>{myS.filter(s=>s.paid).length} / {myS.length}</strong></div>
            )}
          </div>
        {/* Попап ввода времени */}
      {timePopup&&(
        <div className="modal-overlay" onClick={()=>setTimePopup(null)}>
          <div className="modal" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <h2>⏰ Время занятия</h2>
              <button className="btn-icon" onClick={()=>setTimePopup(null)}>✕</button>
            </div>
            <div className="form">
              <div className="field">
                <label>Дата: {timePopup.date}</label>
                <input
                  type="time"
                  defaultValue={timePopup.time}
                  className="search-input"
                  style={{width:'100%',fontSize:18,fontWeight:700,padding:'10px 14px'}}
                  id="time-input-popup"
                  autoFocus
                />
              </div>
              <div className="form-actions">
                <button className="btn btn-ghost" onClick={()=>setTimePopup(null)}>Отмена</button>
                <button className="btn btn-primary" onClick={()=>{
                  const val = document.getElementById('time-input-popup').value;
                  if (timePopup.isNew) {
                    addSession(timePopup.studentId, timePopup.date, val);
                  } else {
                    updateSessionTime(timePopup.sessionId, val);
                  }
                  setTimePopup(null);
                }}>Сохранить</button>
              </div>
            </div>
          </div>
        </div>
      )}
      </>
    )}
    </div>
  );
}

  const [month,setMonth]=useState(today.getMonth()+1);
  const {students,sessions,payments}=useData();
  const prev=()=>{if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1);};
  const active=students.filter(s=>sessions.some(ses=>{if(ses.student_id!==s.id)return false;const d=new Date(ses.date);return d.getFullYear()===year&&d.getMonth()+1===month;}));
  const paid=[],unpaid=[];
  active.forEach(s=>{
    let ok=false;
    if(s.payment_type==='monthly'){const p=payments.find(p=>p.student_id===s.id&&p.year===year&&p.month===month);ok=p?.paid||false;}
    else{const myS=sessions.filter(x=>x.student_id===s.id);const allHeld=myS.filter(x=>x.held).sort((a,b)=>a.date.localeCompare(b.date));const fc=s.has_free?(s.free_count||0):0;const mS=myS.filter(x=>{const d=new Date(x.date);return d.getFullYear()===year&&d.getMonth()+1===month&&x.held;});const paidable=mS.filter(x=>allHeld.findIndex(y=>y.id===x.id)+1>fc);ok=paidable.length>0&&paidable.every(x=>x.paid);}
    (ok?paid:unpaid).push(s);
  });
  const expected=active.reduce((s,x)=>s+MONTHLY_RATES[x.frequency],0);
  const actualMonth=active.reduce((sum,s)=>{
    if(s.payment_type==='monthly'){const p=payments.find(p=>p.student_id===s.id&&p.year===year&&p.month===month);return sum+(p?.paid?MONTHLY_RATES[s.frequency]:0);}
    const myS=sessions.filter(x=>x.student_id===s.id);const allHeld=myS.filter(x=>x.held).sort((a,b)=>a.date.localeCompare(b.date));const fc=s.has_free?(s.free_count||0):0;
    const paidS=myS.filter(x=>{const d=new Date(x.date);return d.getFullYear()===year&&d.getMonth()+1===month&&x.held&&x.paid&&allHeld.findIndex(y=>y.id===x.id)+1>fc;});
    return sum+paidS.length*sRate(s.frequency);
  },0);
  const totalDebt=students.reduce((s,x)=>s+calcDebt(x,sessions,payments).debtAmount,0);
  const allTime=students.reduce((sum,s)=>{
    const myS=sessions.filter(x=>x.student_id===s.id);
    if(s.payment_type==='monthly'){const pM=payments.filter(p=>p.student_id===s.id&&p.paid).length;return sum+pM*MONTHLY_RATES[s.frequency];}
    const allHeld=myS.filter(x=>x.held).sort((a,b)=>a.date.localeCompare(b.date));const fc=s.has_free?(s.free_count||0):0;
    const pC=myS.filter(x=>x.held&&x.paid&&allHeld.findIndex(y=>y.id===x.id)+1>fc).length;
    return sum+pC*sRate(s.frequency);
  },0);
  const debtors=students.map(s=>({student:s,...calcDebt(s,sessions,payments)})).filter(d=>d.debtAmount>0);
  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title"><span className="ti">📊</span><h1>Отчёты</h1></div>
        <div className="month-nav"><button className="btn-icon" onClick={prev}>◀</button><span className="month-label">{MONTHS[month-1]} {year}</span><button className="btn-icon" onClick={next}>▶</button></div>
      </div>
      <div style={{fontSize:13,fontWeight:800,color:'var(--ink3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:12}}>📅 {MONTHS[month-1]} {year}</div>
      <div className="kpi-grid">
        <div className="kpi-card"><span className="kpi-val">{students.length}</span><span className="kpi-label">Всего учеников</span></div>
        <div className="kpi-card"><span className="kpi-val">{active.length}</span><span className="kpi-label">Активны в месяце</span></div>
        <div className="kpi-card green"><span className="kpi-val">{paid.length}</span><span className="kpi-label">Оплатили</span></div>
        <div className="kpi-card red"><span className="kpi-val">{unpaid.length}</span><span className="kpi-label">Не оплатили</span></div>
        <div className="kpi-card blue"><span className="kpi-val">{fmt(expected)}</span><span className="kpi-label">Ожидается</span></div>
        <div className="kpi-card green"><span className="kpi-val">{fmt(actualMonth)}</span><span className="kpi-label">Получено за месяц</span></div>
      </div>
      <div style={{fontSize:13,fontWeight:800,color:'var(--ink3)',textTransform:'uppercase',letterSpacing:.5,marginBottom:12}}>💰 За всё время</div>
      <div className="kpi-grid" style={{marginBottom:28}}>
        <div className="kpi-card green"><span className="kpi-val">{fmt(allTime)}</span><span className="kpi-label">Фактически получено</span></div>
        <div className="kpi-card red"><span className="kpi-val">{fmt(totalDebt)}</span><span className="kpi-label">Общий долг</span></div>
        <div className="kpi-card blue"><span className="kpi-val">{fmt(allTime+totalDebt)}</span><span className="kpi-label">Начислено всего</span></div>
      </div>
      <div className="reports-grid">
        <div className="report-section"><h3 className="section-title green-title">✓ Оплатили <span className="count-badge">{paid.length}</span></h3>
          {paid.length===0?<p className="empty-text">Нет данных</p>:<ul className="student-list">{paid.map(s=><li key={s.id}><span className="avatar-sm">{s.name.charAt(0)}</span>{s.name}<span className="badge sm">{fmt(MONTHLY_RATES[s.frequency])}</span></li>)}</ul>}
        </div>
        <div className="report-section"><h3 className="section-title red-title">✗ Не оплатили <span className="count-badge debt">{unpaid.length}</span></h3>
          {unpaid.length===0?<p className="empty-text">Все оплатили!</p>:<ul className="student-list">{unpaid.map(s=><li key={s.id}><span className="avatar-sm">{s.name.charAt(0)}</span>{s.name}<span className="badge sm">{fmt(MONTHLY_RATES[s.frequency])}</span></li>)}</ul>}
        </div>
        <div className="report-section full-width"><h3 className="section-title red-title">Должники <span className="count-badge debt">{debtors.length}</span></h3>
          {debtors.length===0?<p className="empty-text">Долгов нет 🎉</p>:<ul className="student-list">{debtors.map(({student,debtAmount})=><li key={student.id}><span className="avatar-sm">{student.name.charAt(0)}</span>{student.name}<span className="debt-tag">{fmt(debtAmount)}</span></li>)}</ul>}
        </div>
        <div className="report-section full-width"><h3 className="section-title">Все ученики <span className="count-badge">{students.length}</span></h3>
          <table className="report-table"><thead><tr><th>Имя</th><th>Уровень</th><th>Формат</th><th>Тариф</th><th>Оплата</th><th>Начало</th></tr></thead>
          <tbody>{students.map(s=><tr key={s.id}><td>{s.name}</td><td>{s.level||'—'}</td><td>{s.frequency==='2x'?'2×/нед':'3×/нед'}</td><td>{fmt(MONTHLY_RATES[s.frequency])}</td><td>{s.payment_type==='monthly'?'Помесячная':'По занятиям'}</td><td>{s.start_date?new Date(s.start_date).toLocaleDateString('ru-RU'):'—'}</td></tr>)}</tbody></table>
        </div>
      </div>
    </div>
  );
}

function SetupScreen({onDone}) {
  const [url, setUrl]   = useState('');
  const [key, setKey]   = useState('');
  const [err, setErr]   = useState('');
  const [loading, setLoading] = useState(false);

  const connect = async (e) => {
    e.preventDefault();
    if (!url.trim()||!key.trim()){setErr('Заполните оба поля');return;}
    setLoading(true); setErr('');
    try {
      // Проверяем соединение
      const res = await fetch(`${url.trim()}/rest/v1/students?select=id&limit=1`, {
        headers: {'apikey':key.trim(),'Authorization':`Bearer ${key.trim()}`}
      });
      if (!res.ok) throw new Error(`Ошибка ${res.status} — проверьте URL и ключ`);
      saveConfig(url.trim(), key.trim());
      onDone();
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return (
    <div className="setup-screen">
      <div className="setup-card">
        <div className="setup-logo">🇰🇷</div>
        <div className="setup-title">Корейский Тьютор</div>
        <div className="setup-sub">Подключите Supabase для начала работы</div>
        <div className="setup-steps">
          <div className="setup-step"><div className="step-num">1</div><div className="step-text">Зайдите на <a href="https://supabase.com" target="_blank">supabase.com</a> → ваш проект → Settings → API</div></div>
          <div className="setup-step"><div className="step-num">2</div><div className="step-text">Скопируйте <b>Project URL</b> и <b>anon public</b> ключ</div></div>
          <div className="setup-step"><div className="step-num">3</div><div className="step-text">Вставьте ниже и нажмите «Подключить»</div></div>
        </div>
        <form onSubmit={connect} className="form">
          <div className="field"><label>Project URL</label><input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxxxxxx.supabase.co" required/></div>
          <div className="field"><label>anon public key</label><input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGci…" required/></div>
          {err&&<div className="setup-error">{err}</div>}
          <button type="submit" className="btn btn-primary" disabled={loading} style={{width:'100%',justifyContent:'center'}}>
            {loading?'Проверяю соединение…':'Подключить'}
          </button>
        </form>
      </div>
    </div>
  );
}

function genSlots(s){
  const sl=[];let h=s.startHour,m=s.startMin||0;
  for(let i=0;i<s.slotsCount;i++){
    const fH=h,fM=m,tot=fH*60+fM+s.lessonDuration*60,tH=Math.floor(tot/60),tM=tot%60;
    const fmt=(hh,mm)=>`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
    sl.push({id:`slot${i}`,label:`${fmt(fH,fM)} – ${fmt(tH,tM)}`,fH,fM,tH,tM});
    const nx=tH*60+tM+s.breakDuration*60;h=Math.floor(nx/60);m=nx%60;
    if(h>=24)break;
  }
  return sl;
}
function getDaysS(year,month){const days=[],last=new Date(year,month,0).getDate();for(let d=1;d<=last;d++){const dow=(new Date(year,month-1,d).getDay()+6)%7;days.push({day:d,dow});}return days;}
function dStrS(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function typeColorS(type){
  if(type==='work')return{bg:'#F1F3F5',border:'#CDD1DA'};
  if(type==='rest')return{bg:'#F3F0FF',border:'#C4B5FD'};
  if(type==='yeoncha')return{bg:'#EBFBEE',border:'#86EFAC'};
  return{bg:'#F7F8FA',border:'#E4E7ED'};
}

    // Если в этом слоте есть занятие ученика — не разрешаем сделать его свободным
    if (slot) {
      const studentsInSlot = getStudentsForSlot(ds, slot);
      if (studentsInSlot.length > 0) {
        const cur = slotData[`${ds}_${slotId}`];
        // Разрешаем только переключение в busy, но не в free/undefined
        if (cur === 'busy') return; // уже занято — не меняем
        // Автоматически ставим busy если есть ученик
        const nd={...slotData,[`${ds}_${slotId}`]:'busy'};
        updateSlots(nd); return;
      }
    }
    const k=`${ds}_${slotId}`,cur=slotData[k];
    const next=cur===undefined?'free':cur==='free'?'busy':undefined;
    const nd={...slotData};if(next===undefined)delete nd[k];else nd[k]=next;updateSlots(nd);
  };
  const markDay=(ds,state)=>{const nd={...slotData};slots.forEach(s=>{const k=`${ds}_${s.id}`;if(state===null)delete nd[k];else nd[k]=state;});updateSlots(nd);};
  const getSlotLabel=(ds,slot)=>{const ct=custTime[`${ds}_${slot.id}`];if(!ct)return slot.label;const f=(h,m)=>`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;return `${f(ct.fH,ct.fM)} – ${f(ct.tH,ct.tM)}`;};
  const saveCustomTime=(ds,slotId,fH,fM,tH,tM)=>{const nd={...custTime,[`${ds}_${slotId}`]:{fH:+fH,fM:+fM,tH:+tH,tM:+tM}};setCustTime(nd);lss(KS.custTime(year,month),nd);setEditingSlot(null);};
  const resetCustomTime=(ds,slotId)=>{const nd={...custTime};delete nd[`${ds}_${slotId}`];setCustTime(nd);lss(KS.custTime(year,month),nd);setEditingSlot(null);};

  // ── Вспомогательные функции для дат и времени ──────────────────────────────

  // Переводит 'HH:MM' в минуты
  const timeToMin = (t) => {
    if (!t) return -1;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + (m || 0);
  };

  // Возвращает сегодняшнюю дату в формате YYYY-MM-DD (Asia/Seoul)
  const getTodaySeoul = () => {
    return new Date().toLocaleDateString('en-CA', {timeZone: 'Asia/Seoul'});
  };

  // Нормализует дату занятия к строке YYYY-MM-DD (убирает время если есть)
  const normDate = (d) => (d || '').slice(0, 10);

  // Проверяет попадает ли время занятия в слот (включая пользовательское время)
  const isLessonInsideSlot = (lessonTime, slot, ds) => {
    if (!lessonTime) return false;
    const lMin = timeToMin(lessonTime);
    // Берём лейбл слота (с учётом кастомного времени если есть)
    const lbl = getSlotLabel(ds, slot);
    const parts = lbl.split('–');
    if (parts.length < 2) return false;
    const slotStart = timeToMin(parts[0].trim());
    const slotEnd   = timeToMin(parts[1].trim());
    return lMin >= slotStart && lMin < slotEnd;
  };

  // Возвращает ВСЕ занятия учеников в слоте (может быть несколько)
  const getStudentsForSlot = (ds, slot) => {
    const result = [];
    const dsNorm = normDate(ds);
    const daySessions = sessions.filter(s => normDate(s.date) === dsNorm && s.time);
    for (const s of daySessions) {
      const student = students.find(st => st.id === s.student_id);
      if (!student) continue;
      if (isLessonInsideSlot(s.time, slot, ds)) {
        result.push({ student, session: s });
      }
    }
    return result;
  };

  // Оставляем для совместимости (возвращает первого)
  const getStudentForSlot = (ds, slot) => {
    const all = getStudentsForSlot(ds, slot);
    return all.length > 0 ? all[0] : null;
  };
  const saveWorkAvail=(ds,text)=>{const nd={...workAvail};if(!text.trim())delete nd[ds];else nd[ds]=text.trim();setWorkAvail(nd);lss(KS.workAvail(year,month),nd);};
  const getNextWeekDates=(ds)=>{const d=new Date(ds);const targets=[];for(let i=7;;i+=7){const next=new Date(d);next.setDate(d.getDate()+i);if(next.getMonth()+1!==month||next.getFullYear()!==year)break;targets.push(next.toISOString().slice(0,10));}return targets;};
  const repeatNextWeek=(ds)=>{const targets=getNextWeekDates(ds);if(!Object.keys(slotData).some(k=>k.startsWith(ds)))return 0;const nd={...slotData};const ct2={...custTime};targets.forEach(td=>{slots.forEach(s=>{const fk=`${ds}_${s.id}`,tk=`${td}_${s.id}`;if(slotData[fk])nd[tk]=slotData[fk];if(custTime[fk])ct2[tk]=custTime[fk];});});setSlotData(nd);lss(KS.slotData(year,month),nd);setCustTime(ct2);lss(KS.custTime(year,month),ct2);return targets.length;};
  const repeatWorkAvail=(ds)=>{const text=workAvail[ds];if(!text)return 0;const targets=getNextWeekDates(ds);if(!targets.length)return 0;const nd={...workAvail};targets.forEach(td=>{nd[td]=text;});setWorkAvail(nd);lss(KS.workAvail(year,month),nd);return targets.length;};
  const applySettings=()=>{const ns={...tempSettings,startHour:+tempSettings.startHour,startMin:+(tempSettings.startMin||0),lessonDuration:+tempSettings.lessonDuration,breakDuration:+tempSettings.breakDuration,slotsCount:+tempSettings.slotsCount,workDayStart:tempSettings.workDayStart||'10:00',workDayEnd:tempSettings.workDayEnd||'19:00'};setSettings(ns);lss(KS.settings,ns);setShowSettings(false);};
  const saveImage=async()=>{setSaving(true);try{if(!window.html2canvas){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}const canvas=await window.html2canvas(printRef.current,{scale:2,backgroundColor:'#fff',useCORS:true});const a=document.createElement('a');a.download=`${t.months[month-1]}_${year}.png`;a.href=canvas.toDataURL('image/png');a.click();}catch{alert(t.noInternet);}setSaving(false);};

                    onMouseEnter={e=>e.currentTarget.style.transform='scale(1.02)'}

                  >

                            if (st==='free') return <><span style={{color:'var(--green)'}}>✓</span><span style={{color:'var(--green)',fontWeight:700}}>{t.slotFree}</span></>;
                            if (st==='busy') return <><span style={{color:'var(--red)'}}>✕</span><span style={{color:'var(--red)',fontWeight:700}}>{t.slotBusy}</span></>;
                            return <span style={{color:'var(--ink3)'}}>{t.slotEmpty}</span>;
                          })()}
                        </span>
                        <button onClick={e=>{e.stopPropagation();setEditingSlot(isEditing?null:{slotId:slot.id,from:defFrom,to:defTo});}} style={{width:28,height:28,borderRadius:6,border:'none',background:'transparent',cursor:'pointer',fontSize:14,opacity:isEditing?1:.5}}>✏️</button>
                      </div>
                      {isEditing&&(
                        <div onClick={e=>e.stopPropagation()} style={{background:'var(--purple-lt)',border:'1.5px solid #C4B5FD',borderTop:'none',borderRadius:'0 0 9px 9px',padding:'11px 14px',display:'flex',flexDirection:'column',gap:9}}>
                          <div style={{fontSize:11,fontWeight:700,color:'var(--purple)',textTransform:'uppercase',letterSpacing:.4}}>{t.customTimeLabel}</div>
                          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                            <span style={{fontSize:12,fontWeight:600,color:'var(--ink3)'}}>{t.timeFrom}</span>
                            <input type="time" value={editingSlot.from} onChange={e=>setEditingSlot(p=>({...p,from:e.target.value}))} style={{padding:'6px 10px',border:'1.5px solid #C4B5FD',borderRadius:7,fontSize:14,fontWeight:700,outline:'none',background:'#fff',width:120}}/>
                            <span style={{fontSize:12,fontWeight:600,color:'var(--ink3)'}}>{t.timeTo}</span>
                            <input type="time" value={editingSlot.to} onChange={e=>setEditingSlot(p=>({...p,to:e.target.value}))} style={{padding:'6px 10px',border:'1.5px solid #C4B5FD',borderRadius:7,fontSize:14,fontWeight:700,outline:'none',background:'#fff',width:120}}/>
                          </div>
                          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                            <button onClick={()=>resetCustomTime(popup.ds,slot.id)} style={{padding:'6px 11px',borderRadius:7,border:'1.5px solid var(--border2)',background:'var(--bg)',fontSize:12.5,fontWeight:700,cursor:'pointer',color:'var(--ink2)'}}>↺ {t.resetTime}</button>
                            <button onClick={()=>{const[fH,fM]=editingSlot.from.split(':').map(Number);const[tH,tM]=editingSlot.to.split(':').map(Number);saveCustomTime(popup.ds,slot.id,fH,fM,tH,tM);}} style={{padding:'6px 11px',borderRadius:7,border:'1.5px solid var(--green)',background:'var(--green-lt)',fontSize:12.5,fontWeight:700,cursor:'pointer',color:'var(--green)'}}>✓ {t.saveTime}</button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              {/* Кастомное время (корейский) */}
              {lang==='ko'&&(
                <div style={{marginTop:12,padding:'12px 14px',background:'#F0FFF4',border:'1.5px solid #86EFAC',borderRadius:10,display:'flex',flexDirection:'column',gap:7}}>
                  <div style={{fontSize:12.5,fontWeight:700,color:'var(--green)'}}>{t.customWorkTime}</div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <input type="text" className="search-input" style={{flex:1,width:'auto'}} placeholder={t.customWorkTimePlaceholder} defaultValue={workAvail[popup.ds]||''} key={popup.ds} onChange={e=>saveWorkAvail(popup.ds,e.target.value)}/>
                    {workAvail[popup.ds]&&<button onClick={()=>saveWorkAvail(popup.ds,'')} style={{padding:'6px 10px',borderRadius:7,border:'1.5px solid #86EFAC',background:'#fff',color:'var(--green)',fontSize:12,fontWeight:700,cursor:'pointer'}}>✕ {t.customWorkTimeReset}</button>}
                  </div>
                  {workAvail[popup.ds]&&<button onClick={()=>{const n=repeatWorkAvail(popup.ds);alert(n>0?t.repeatDone(n):t.repeatNone);}} style={{width:'100%',padding:'7px 12px',borderRadius:8,border:'1.5px dashed #86EFAC',background:'#fff',color:'var(--green)',fontSize:13,fontWeight:700,cursor:'pointer'}}>🔁 {t.repeatWeek}</button>}
                  <div style={{fontSize:11,color:'var(--ink3)'}}>비워두면 자동 계산됩니다</div>
                </div>
              )}
              {/* Повторить */}
              <button onClick={()=>{const n=repeatNextWeek(popup.ds);alert(n>0?t.repeatDone(n):t.repeatNone);}} style={{width:'100%',marginTop:10,padding:'10px 14px',borderRadius:9,border:'1.5px dashed #A5B4FC',background:'var(--blue-lt)',color:'var(--blue)',fontSize:13.5,fontWeight:700,cursor:'pointer',textAlign:'center'}}>
                {t.repeatWeek}
              </button>
            </>)}
            {getDayType(popup.ds,popup.dow)!=='normal'&&(
              <div style={{marginTop:12,padding:'14px 16px',background:'var(--bg)',borderRadius:9,fontSize:14,fontWeight:600,color:'var(--ink2)',textAlign:'center'}}>
                {getDayType(popup.ds,popup.dow)==='work'&&<span>{lang==='ko'?'🏢 회사 출근일 — 수업 없음':'🏢 Work day — no lessons'}</span>}
                {getDayType(popup.ds,popup.dow)==='rest'&&<span>{lang==='ko'?'🌙 휴무일':'🌙 Day off'}</span>}
                {getDayType(popup.ds,popup.dow)==='yeoncha'&&<span>🍃 {lang==='ko'?'연차 / 개인 휴가':'Annual leave'}</span>}
              </div>
            )}
          </div>
        </div>
      );})()}

      {/* Настройки */}
      {showSettings&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'#fff',borderRadius:14,width:'100%',maxWidth:440,maxHeight:'90vh',overflowY:'auto',boxShadow:'var(--shadow-md)',padding:22}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14,gap:10}}>
              <div><div style={{fontSize:16,fontWeight:800}}>{t.settingsTitle}</div><div style={{fontSize:12,color:'var(--ink3)',marginTop:3}}>{t.settingsSub}</div></div>
              <button className="btn-icon" onClick={()=>setShowSettings(false)}>✕</button>
            </div>
            <div className="form">
              <div className="field"><label>{t.workDay}</label>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{color:'var(--ink3)',fontSize:13}}>{t.workDayStart}</span>
                  <input type="time" value={tempSettings.workDayStart||'10:00'} onChange={e=>setTempSettings(p=>({...p,workDayStart:e.target.value}))} style={{width:130}}/>
                  <span style={{color:'var(--ink3)',fontSize:13}}>{t.workDayEnd}</span>
                  <input type="time" value={tempSettings.workDayEnd||'19:00'} onChange={e=>setTempSettings(p=>({...p,workDayEnd:e.target.value}))} style={{width:130}}/>
                </div>
              </div>
              <div className="field"><label>{t.startTime}</label>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input type="number" min={0} max={23} value={tempSettings.startHour} onChange={e=>setTempSettings(p=>({...p,startHour:e.target.value}))} style={{width:70}}/>
                  <span style={{color:'var(--ink3)'}}>{t.hour}</span>
                  <input type="number" min={0} max={59} step={5} value={tempSettings.startMin||0} onChange={e=>setTempSettings(p=>({...p,startMin:e.target.value}))} style={{width:70}}/>
                  <span style={{color:'var(--ink3)'}}>{t.min}</span>
                </div>
              </div>
              <div className="field"><label>{t.lessonDur}</label><input type="number" min={1} max={8} step={0.5} value={tempSettings.lessonDuration} onChange={e=>setTempSettings(p=>({...p,lessonDuration:e.target.value}))} style={{width:80}}/></div>
              <div className="field"><label>{t.breakDur}</label><input type="number" min={0} max={4} step={0.5} value={tempSettings.breakDuration} onChange={e=>setTempSettings(p=>({...p,breakDuration:e.target.value}))} style={{width:80}}/></div>
              <div className="field"><label>{t.slotsCount}</label><input type="number" min={1} max={6} value={tempSettings.slotsCount} onChange={e=>setTempSettings(p=>({...p,slotsCount:e.target.value}))} style={{width:80}}/></div>
              <div style={{background:'var(--bg)',borderRadius:8,padding:12,display:'flex',flexWrap:'wrap',gap:6}}>
                <div style={{fontSize:12,fontWeight:700,color:'var(--ink3)',width:'100%'}}>{t.preview}</div>
                {genSlots({startHour:+tempSettings.startHour,startMin:+(tempSettings.startMin||0),lessonDuration:+tempSettings.lessonDuration,breakDuration:+tempSettings.breakDuration,slotsCount:+tempSettings.slotsCount}).map(s=><span key={s.id} style={{background:'var(--blue-lt)',color:'var(--blue)',fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:7,border:'1.5px solid #A5B4FC'}}>⏰ {s.label}</span>)}
              </div>
              <div className="form-actions">
                <button className="btn btn-ghost" onClick={()=>setShowSettings(false)}>{t.cancel}</button>
                <button className="btn btn-primary" onClick={applySettings}>{t.apply}</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Основной компонент ────────────────────────────────────────────────────────
const TABS = [
  {id:'students',  label:'Ученики',    icon:'👥'},
  {id:'calendar',  label:'Календарь',  icon:'📅'},
  {id:'debts',     label:'Долги',      icon:'⚠️'},
  {id:'reports',   label:'Отчёты',     icon:'📊'},
  {id:'schedule',  label:'Расписание', icon:'🗓'},
];

function Shell() {
  const [tab, setTab] = useState('students');
  const {students, sessions, payments} = useData();
  const debtorCount = students.filter(s=>calcDebt(s,sessions,payments).debtAmount>0).length;
  return (
    <div className="app-shell">
      <nav className="sidebar">
        <div className="sidebar-logo">
          <span className="logo-ko">한</span>
          <div><div className="logo-title">Корейский Тьютор</div><div className="logo-sub">учёт оплат</div></div>
        </div>
        <ul className="nav-list">
          {TABS.map(({id,label,icon})=>(
            <li key={id}><button className={`nav-item ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
              <span>{icon}</span><span>{label}</span>
              {id==='debts'&&debtorCount>0&&<span className="nav-badge">{debtorCount}</span>}
            </button></li>
          ))}
        </ul>
        <div className="sidebar-footer">
          <span>v2.0 · Supabase</span>
          <button onClick={()=>{if(confirm('Отключить Supabase и сбросить конфигурацию?')){clearConfig();}}} title="Сменить базу данных">⚙️</button>
        </div>
      </nav>
      <main className="main-content">
        {tab==='students'&&<StudentsPage/>}
        {tab==='calendar'&&<CalendarPage/>}
        {tab==='debts'   &&<DebtsPage/>}
        {tab==='reports'  &&<ReportsPage/>}
        {tab==='schedule' &&<SchedulePage/>}
      </main>
    </div>
  );
}

function App() {
  const [configured, setConfigured] = useState(!!getConfig());
  if (!configured) return <SetupScreen onDone={()=>setConfigured(true)}/>;
  return <DataProvider><Shell/></DataProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
